<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agricultural Trading Marketplace</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f2f9f2;
        margin: 0;
        padding: 0;
    }

    header {
        background: #2e8b57;
        color: white;
        text-align: center;
        padding: 20px 0;
    }

    nav {
        background: #1f5f3d;
        padding: 10px;
        text-align: center;
    }

    nav a {
        color: white;
        text-decoration: none;
        margin: 0 15px;
        font-size: 16px;
    }

    .container {
        max-width: 1100px;
        margin: auto;
        padding: 20px;
    }

    .section-title {
        text-align: center;
        margin-top: 30px;
        font-size: 28px;
        color: #2e8b57;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }

    .card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 10px;
    }

    .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
    }

    .product-title {
        font-size: 20px;
        font-weight: bold;
        margin: 10px 0;
    }

    .price {
        color: #1f5f3d;
        font-weight: bold;
        margin-bottom: 10px;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        background: #2e8b57;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #256f45;
    }

    .add-form input, .add-form select {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin: 10px 0;
    }nav{
    background:#222;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    padding:15px;
    position:sticky;
    top:0;
    z-index:1000;
}

nav a{
    color:white;
    text-decoration:none;
    margin:10px 15px;
    transition:0.3s;
}

nav a:hover{
    color:#4CAF50;
}

</style>
</head>

<body>

<header>
    <h1>🌱 Agricultural Trading Marketplace</h1>
    <p>Buy and Sell Fresh Farm Products Easily</p>
</header>

<nav>
    <a href="main.html">Home</a>
    <a href="crop market place.html">Marketplace</a>
    <a href="#">Sell Products</a>
    <a href="contact.html">Contact</a>
    <a href="crops.html">Crops</a>
    <a href="livestock.html">Livestock</a>
    <a href="weather.html">Weather</a>

    <a href="ai.html">AI Guide</a>  
</nav>


<div class="container">

    <!-- Featured Products Section -->
    <h2 class="section-title">Featured Agricultural Products</h2>

    <div class="product-grid">

        <!-- Product 1 -->
        <div class="card">
            <img src="https://via.placeholder.com/300x200?text=Maize" alt="Maize">
            <div class="product-title">Maize (50kg bag)</div>
            <div class="price">$22</div>
            <button onclick="contactSeller('Maize')">Contact Seller</button>
        </div>

        <!-- Product 2 -->
        <div class="card">
            <img src="https://via.placeholder.com/300x200?text=Tomatoes" alt="Tomatoes">
            <div class="product-title">Fresh Tomatoes (Crate)</div>
            <div class="price">$18</div>
            <button onclick="contactSeller('Tomatoes')">Contact Seller</button>
        </div>

        <!-- Product 3 -->
        <div class="card">
            <img src="https://via.placeholder.com/300x200?text=Rice" alt="Rice">
            <div class="product-title">Rice (50kg bag)</div>
            <div class="price">$35</div>
            <button onclick="contactSeller('Rice')">Contact Seller</button>
        </div>
    </div>

    <!-- Selling Form -->
    <h2 class="section-title">Sell Your Products</h2>

    <div class="card add-form">
        <input type="text" id="productName" placeholder="Product name (e.g., Wheat)">
        <input type="number" id="productPrice" placeholder="Price (e.g., 25)">
        <input type="number" id="productQuantity" placeholder="Quantity (e.g., 100 kg)">
        <select id="productCategory">
            <option>Grains</option>
            <option>Vegetables</option>
            <option>Fruits</option>
            <option>Livestock</option>
            <option>Seeds</option>
        </select>
        <button onclick="addProduct()">Add Product</button>
    </div>

    <div id="newProducts"></div>

</div>

<script>
    function contactSeller(product) {
        alert("You are contacting the seller of: " + product);
    }

    function addProduct() {
        let name = document.getElementById("productName").value;
        let price = document.getElementById("productPrice").value;
        let quantity = document.getElementById("productQuantity").value;
        let category = document.getElementById("productCategory").value;

        let card = `
        <div class="card">
            <div class="product-title">${name} (${quantity})</div>
            <div class="price">$${price}</div>
            <p>Category: ${category}</p>
            <button>Contact Seller</button>
        </div>
        `;

        document.getElementById("newProducts").innerHTML += card;
        alert("Product added successfully!");
    }
</script>

</body>
</html>
