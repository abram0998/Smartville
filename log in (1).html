<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef6ee;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      width: 360px;
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2b6b2b;
    }
    label {
      margin-top: 15px;
      display: block;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #2b6b2b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #245924;
    }
    .link {
      text-align: center;
      margin-top: 10px;
    }
    .link a {
      color: #2b6b2b;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Seller Login</h2>
    <form>
      <label>Phone Number or Email</label>
      <input type="text" placeholder="Enter your phone or email" required />

      <label>Password</label>
      <input type="password" placeholder="Enter your password" required />

      <button type="submit">Log In</button>

      <div class="link">
        <p><a href="password reacovery.html">Forgot Password?</a></p>
        <p><a href="registration.html">Create a Seller Account</a></p>
      </div>
    </form>
  </div>
</body>
</html>
